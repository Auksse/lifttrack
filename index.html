<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LiftTrack">
  <meta name="theme-color" content="#0e0d0b">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <title>LiftTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:#0e0d0b; --card:#161412; --card2:#1c1a17; --card3:#222018;
      --border:#282420; --border2:#332e28;
      --gold:#e8b84b; --gold2:#f5d47a; --gold3:#c89830; --gold-dim:#2e2208;
      --push:#c96b4a; --pull:#4a90b8; --legs:#5a9e62; --upper:#8860b8;
      --text:#f0e6d3; --text2:#c8bca8; --muted:#6a6050; --dim:#3a3428;
      --red:#c84848; --green:#5a9e62;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;padding-top:env(safe-area-inset-top);overflow-x:hidden;}
    #app{display:flex;flex-direction:column;height:100dvh;}

    /* HEADER */
    .header{padding:14px 18px 12px;flex-shrink:0;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,#1c1810 0%,var(--card) 100%);border-bottom:1px solid var(--border);}
    .logo{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:0.1em;line-height:1;}
    .logo em{color:var(--gold);font-style:normal;}
    .header-right{display:flex;align-items:center;gap:9px;}
    .log-btn{background:linear-gradient(135deg,var(--gold) 0%,var(--gold3) 100%);color:#0e0d0b;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;letter-spacing:0.04em;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 2px 10px rgba(232,184,75,0.3);}
    .rest-badge{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:5px 9px;border-radius:7px;border:1px solid var(--border2);color:var(--muted);background:var(--card2);}
    .rest-badge.warn{border-color:#4a2018;color:var(--red);background:#1a0f0f;}

    /* STAT STRIP */
    .stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border);flex-shrink:0;}
    .stat-cell{background:linear-gradient(160deg,#181512 0%,var(--card) 100%);padding:10px 12px;position:relative;overflow:hidden;}
    .stat-cell-label{font-size:7px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
    .stat-cell-val{font-family:'Bebas Neue',cursive;font-size:22px;line-height:1;}
    .stat-cell-sub{font-size:8px;color:var(--muted);margin-top:2px;font-family:'IBM Plex Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .stat-cell.next{cursor:pointer;}

    /* TABS */
    .tabs{display:flex;background:linear-gradient(0deg,#111008 0%,var(--card) 100%);border-top:1px solid var(--border);position:fixed;bottom:0;left:0;right:0;padding-bottom:max(env(safe-area-inset-bottom),20px);z-index:100;}
    .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 4px 3px;border:none;background:none;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;gap:3px;transition:color 0.15s;}
    .tab.active{color:var(--gold);}
    .tab-icon{font-size:16px;line-height:1;}
    .tab-dot{width:3px;height:3px;border-radius:50%;background:var(--gold);margin-top:1px;opacity:0;transition:opacity 0.15s;}
    .tab.active .tab-dot{opacity:1;}

    /* CONTENT */
    .content{flex:1;overflow-y:auto;padding-bottom:90px;}
    .content::-webkit-scrollbar{display:none;}

    /* SECTION HEADER */
    .section-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#181512 0%,var(--card) 100%);}
    .section-title{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:0.08em;margin-bottom:6px;}

    /* MONTH */
    .month-header{padding:14px 16px 5px;display:flex;align-items:center;gap:10px;}
    .month-label{font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:0.16em;color:var(--muted);}
    .month-line{flex:1;height:1px;background:var(--border);}
    .month-count{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim);}

    /* SESSION CARDS */
    .session-card{margin:0 12px 8px;border-radius:14px;overflow:hidden;border:1px solid var(--border);transition:border-color 0.15s;}
    .session-card.open{border-color:var(--border2);}
    .s-top{display:flex;align-items:stretch;cursor:pointer;}
    .s-stripe{width:3px;flex-shrink:0;}
    .s-main{flex:1;padding:11px 12px 10px 11px;min-width:0;}
    .s-date{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:2px;}
    .s-title-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
    .s-title{font-family:'Bebas Neue',cursive;font-size:19px;letter-spacing:0.05em;line-height:1;}
    .focus-tag{font-size:8px;font-weight:700;padding:2px 6px;border-radius:20px;letter-spacing:0.06em;}
    .pr-tag{font-size:8px;padding:2px 6px;border-radius:20px;background:#2a2008;color:var(--gold);letter-spacing:0.04em;font-family:'IBM Plex Mono',monospace;border:1px solid #4a3810;}
    .s-mini-bars{display:flex;align-items:flex-end;gap:2px;height:18px;margin-top:7px;}
    .s-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;padding:11px 12px 10px 0;flex-shrink:0;}
    .s-vol-num{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text2);}
    .s-vol-unit{font-size:8px;color:var(--dim);}
    .s-chevron{font-size:9px;color:var(--dim);transition:transform 0.2s;margin-top:4px;}
    .s-chevron.open{transform:rotate(180deg);}

    /* SESSION BODY */
    .s-body{border-top:1px solid var(--border);background:linear-gradient(180deg,#181512 0%,var(--card) 60%);}
    .s-body-inner{padding:12px 14px;}
    .ex-row{margin-bottom:10px;}
    .ex-name-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
    .ex-name-lbl{font-size:11px;color:var(--muted);}
    .ex-name-lbl.pr{color:var(--gold);}
    .ss-pill{font-size:8px;background:#2a1e08;color:var(--gold);border-radius:3px;padding:1px 5px;font-family:'IBM Plex Mono',monospace;border:1px solid #3a2e10;}
    .ex-pr-lbl{font-size:9px;color:var(--gold);font-family:'IBM Plex Mono',monospace;opacity:0.65;}
    .sets-row{display:flex;flex-wrap:wrap;gap:4px;}
    .set-pill{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#7a7060;background:var(--card3);border:1px solid var(--border);border-radius:5px;padding:3px 7px;}
    .set-pill.top{border-color:#4a3818;color:var(--gold2);background:#201a08;}
    .s-actions{display:flex;gap:7px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap;}
    .s-act-btn{background:var(--card3);border:1px solid var(--border2);border-radius:7px;color:var(--muted);padding:6px 12px;font-size:10px;cursor:pointer;letter-spacing:0.05em;text-transform:uppercase;font-family:'DM Sans',sans-serif;font-weight:600;}
    .s-act-btn.danger{color:#7a3030;border-color:#3a1818;background:#160e0e;}
    .s-act-btn.primary{color:var(--gold);border-color:#3a2e10;background:var(--gold-dim);}

    /* EDIT FORM inside session */
    .edit-form{padding:12px 14px;}
    .edit-ex-card{background:var(--card3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
    .edit-ex-header{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
    .reorder-btns{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
    .reorder-btn{background:var(--card2);border:1px solid var(--border);border-radius:5px;color:var(--muted);width:26px;height:17px;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;line-height:1;}
    .reorder-btn:disabled{opacity:0.2;cursor:default;}
    .edit-name-input{flex:1;background:var(--card);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:8px 10px;font-size:16px;font-family:'DM Sans',sans-serif;}
    .edit-name-input:focus{outline:none;border-color:var(--gold3);}
    .rm-ex-btn{background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--muted);width:30px;height:34px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

    /* PROGRESS */
    .ex-chips{display:flex;flex-wrap:wrap;gap:5px;}
    .ex-chip{font-size:10px;font-family:'DM Sans',sans-serif;font-weight:600;padding:4px 11px;border-radius:20px;border:1px solid var(--border2);background:var(--card2);color:var(--muted);cursor:pointer;transition:all 0.12s;}
    .ex-chip.active{background:var(--gold-dim);color:var(--gold);border-color:#4a3810;}
    .chart-block{padding:14px 16px;border-bottom:1px solid var(--border);}
    .chart-block-title{font-size:8px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
    .chart-big{font-family:'Bebas Neue',cursive;font-size:32px;line-height:1;}
    .chart-delta{font-family:'IBM Plex Mono',monospace;font-size:10px;margin-left:8px;}
    .chart-wrap{position:relative;height:150px;margin-top:12px;}

    /* MUSCLES TAB */
    .muscle-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px;}
    .muscle-cell{background:linear-gradient(135deg,var(--card2) 0%,var(--card) 100%);border:1px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:border-color 0.15s;}
    .muscle-cell:active{opacity:0.8;}
    .muscle-cell-name{font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:0.06em;margin-bottom:4px;}
    .muscle-cell-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);}
    .muscle-cell-bar{height:2px;border-radius:1px;margin-top:8px;background:var(--border);}
    .muscle-cell-fill{height:100%;border-radius:1px;transition:width 0.5s ease;}
    .muscle-detail-header{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#181512 0%,var(--card) 100%);}
    .back-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;padding:0;}
    .muscle-ex-card{background:linear-gradient(135deg,var(--card2) 0%,var(--card) 100%);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:7px;}
    .muscle-ex-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:7px;}
    .score-row{display:flex;align-items:center;gap:10px;margin-bottom:5px;}
    .score-label{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);width:68px;flex-shrink:0;}
    .score-dots{display:flex;gap:5px;}
    .score-dot{width:9px;height:9px;border-radius:50%;background:var(--border2);}
    .score-dot.on{background:var(--gold);}
    .score-dot.on.sec{background:var(--gold3);opacity:0.55;}
    .muscle-ex-stats{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);margin-top:4px;}

    /* OVERVIEW */
    .ov-section{padding:14px 16px;border-bottom:1px solid var(--border);}
    .ov-title{font-size:8px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
    .focus-row{margin-bottom:10px;}
    .focus-row-top{display:flex;justify-content:space-between;margin-bottom:4px;}
    .focus-row-name{font-size:12px;font-weight:600;}
    .focus-row-count{font-size:9px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
    .focus-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
    .focus-fill{height:100%;border-radius:2px;}
    .vol-bars{display:flex;align-items:flex-end;gap:3px;height:56px;}
    .vol-bar{flex:1;border-radius:2px 2px 0 0;min-height:2px;opacity:0.75;}
    .freq-grid{display:flex;flex-wrap:wrap;gap:6px;}
    .freq-item{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;display:flex;align-items:center;gap:7px;}
    .freq-name{font-size:11px;color:var(--text2);}
    .freq-n{font-size:9px;font-family:'IBM Plex Mono',monospace;background:var(--gold-dim);color:var(--gold);border-radius:3px;padding:1px 5px;}

    /* ADD FORM */
    .add-header{padding:14px 16px 11px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#181512 0%,var(--card) 100%);}
    .add-title{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:0.08em;}
    .add-body{padding:12px 14px;}
    .form-row{display:flex;gap:10px;}
    .form-group{flex:1;margin-bottom:12px;}
    .form-label{font-size:8px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px;}
    .form-input{width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:9px;color:var(--text);padding:10px 12px;font-size:16px;font-family:'DM Sans',sans-serif;-webkit-appearance:none;appearance:none;color-scheme:dark;}
    .form-input:focus{outline:none;border-color:var(--gold3);}
    .form-input::placeholder{color:var(--dim);}
    .tmpl-banner{border-radius:10px;padding:9px 13px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;background:#181508;border:1px solid #2e2a10;}
    .tmpl-lbl{font-size:8px;letter-spacing:0.16em;text-transform:uppercase;color:#5a5020;margin-bottom:2px;}
    .tmpl-date{font-size:11px;color:#b09030;font-family:'IBM Plex Mono',monospace;}
    .tmpl-clear{background:transparent;border:1px solid #2e2a10;border-radius:6px;color:#4a4018;padding:4px 9px;font-size:9px;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;font-family:'DM Sans',sans-serif;}
    .no-tmpl{border-radius:10px;padding:9px 13px;margin-bottom:12px;background:var(--card2);border:1px dashed var(--border2);text-align:center;font-size:10px;color:var(--dim);}

    /* EX CARD in form */
    .ex-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:9px;}
    .ex-card-header{display:flex;gap:6px;margin-bottom:8px;align-items:flex-start;}
    .ex-name-wrap{flex:1;position:relative;}
    .ex-name-input{width:100%;background:var(--card);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:9px 11px;font-size:16px;font-family:'DM Sans',sans-serif;}
    .ex-name-input:focus{outline:none;border-color:var(--gold3);}
    .ex-name-input::placeholder{color:var(--dim);}
    .rm-ex-btn-add{background:transparent;border:1px solid var(--border2);border-radius:7px;color:var(--muted);width:34px;height:38px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

    /* Reorder in add form */
    .reorder-wrap{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
    .reorder-btn-add{background:var(--card);border:1px solid var(--border);border-radius:5px;color:var(--muted);width:26px;height:17px;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;line-height:1;}
    .reorder-btn-add:disabled{opacity:0.2;cursor:default;}

    /* Autocomplete */
    .autocomplete{position:absolute;top:calc(100% + 3px);left:0;right:0;background:#201e18;border:1px solid var(--border2);border-radius:8px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,0.6);overflow:hidden;}
    .ac-item{padding:9px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
    .ac-item:last-child{border-bottom:none;}
    .ac-match{font-size:8px;color:var(--gold3);font-family:'IBM Plex Mono',monospace;}

    /* Overload hint */
    .overload-hint{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#121008;border:1px solid #252010;border-radius:8px;margin-bottom:8px;}
    .oh-icon{font-size:13px;flex-shrink:0;}
    .oh-text{font-size:10px;color:#908040;line-height:1.4;flex:1;}
    .oh-text strong{color:var(--gold2);}
    .oh-apply{background:var(--gold-dim);border:1px solid #3a2e10;color:var(--gold);border-radius:6px;padding:4px 9px;font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:700;white-space:nowrap;flex-shrink:0;}

    /* Alt row */
    .alt-row{display:flex;align-items:flex-start;gap:7px;margin-bottom:8px;}
    .alt-label{font-size:8px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;flex-shrink:0;margin-top:5px;}
    .alt-chips{display:flex;gap:5px;flex-wrap:wrap;}
    .alt-chip{background:var(--card);border:1px solid var(--border2);color:var(--muted);border-radius:6px;padding:4px 9px;font-size:10px;cursor:pointer;}

    /* Set rows */
    .set-form-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
    .set-num{font-size:9px;color:var(--dim);font-family:'IBM Plex Mono',monospace;width:12px;text-align:right;flex-shrink:0;}
    .set-input{background:var(--card);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:8px;font-size:16px;font-family:'IBM Plex Mono',monospace;width:62px;text-align:center;-webkit-appearance:none;appearance:none;color-scheme:dark;}
    .set-input:focus{outline:none;border-color:var(--gold3);}
    .set-sep{color:var(--border2);font-size:12px;flex-shrink:0;}
    .prev-ref{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);margin-left:3px;white-space:nowrap;}
    .prev-up{color:var(--green);}
    .prev-dn{color:var(--red);}
    .rm-set-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:15px;padding:0 2px;line-height:1;flex-shrink:0;}
    .add-set-btn{background:transparent;border:1px dashed var(--border2);border-radius:7px;color:var(--muted);padding:6px 10px;font-size:9px;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;font-family:'DM Sans',sans-serif;margin-top:4px;}

    /* Buttons */
    .ghost-btn{width:100%;background:transparent;border:1px dashed var(--border2);border-radius:9px;color:var(--muted);padding:10px;font-size:9px;cursor:pointer;letter-spacing:0.14em;text-transform:uppercase;font-family:'DM Sans',sans-serif;margin-bottom:8px;}
    .save-btn{width:100%;background:linear-gradient(135deg,var(--gold) 0%,var(--gold3) 100%);border:none;border-radius:11px;color:#0e0d0b;padding:13px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;font-family:'DM Sans',sans-serif;margin-top:4px;box-shadow:0 4px 14px rgba(232,184,75,0.2);}
    .save-btn:disabled{opacity:0.3;cursor:not-allowed;}

    /* Setup */
    .setup-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:32px 20px;text-align:center;}
    .setup-logo{font-family:'Bebas Neue',cursive;font-size:52px;letter-spacing:0.06em;margin-bottom:6px;}
    .setup-logo em{color:var(--gold);font-style:normal;}
    .setup-sub{color:var(--muted);font-size:13px;margin-bottom:28px;line-height:1.5;}
    .setup-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;width:100%;max-width:400px;text-align:left;}
    .setup-step{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;}
    .step-num{font-family:'Bebas Neue',cursive;font-size:26px;color:var(--gold);line-height:1;flex-shrink:0;width:22px;}
    .step-text{font-size:12px;color:#888;line-height:1.6;}
    .step-text a{color:var(--gold);text-decoration:none;}
    .step-text code{background:#181410;padding:2px 5px;border-radius:4px;font-size:10px;font-family:'IBM Plex Mono',monospace;color:#ccc;word-break:break-all;}
    .setup-hr{border:none;border-top:1px solid var(--border);margin:18px 0;}
    .setup-lbl{font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px;}
    .setup-connect{width:100%;background:linear-gradient(135deg,var(--gold) 0%,var(--gold3) 100%);border:none;border-radius:10px;color:#0e0d0b;padding:13px;font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:14px;}

    /* Loading / Toast */

function fmtMonth(ds){const d=new Date(ds+'T12:00:00');return d.toLocaleDateString('en-GB',{month:'long',year:'numeric'});}
function daysSince(ds){return Math.floor((Date.now()-new Date(ds+'T12:00:00'))/86400000);}
function sVol(s){return s.exercises.reduce((t,ex)=>t+ex.sets.reduce((st,set)=>st+set.r*Math.max(set.w,0),0),0);}
function allExNames(){const c={};sessions.forEach(s=>s.exercises.forEach(e=>{c[e.name]=(c[e.name]||0)+1;}));return Object.entries(c).filter(([,n])=>n>=2).sort((a,b)=>b[1]-a[1]).map(([n])=>n);}
function nextSugg(){if(!sessions.length)return{focus:'Push',reason:'First session'};const last=sessions[sessions.length-1];const rot=['Push','Pull','Legs'];const da=daysSince(last.date);if(rot.includes(last.focus)){const next=rot[(rot.indexOf(last.focus)+1)%3];return{focus:next,reason:`${last.focus} was ${da}d ago`};}const ld={};sessions.forEach(s=>{if(rot.includes(s.focus))ld[s.focus]=s.date;});const next=rot.sort((a,b)=>(ld[a]||'0')<(ld[b]||'0')?-1:1)[0];return{focus:next,reason:'Least recently trained'};}
function lastByFocus(focus){return[...sessions].reverse().find(s=>s.focus===focus)||null;}
function isNewPR(session,exName){const ex=session.exercises.find(e=>e.name===exName);if(!ex)return false;const mw=Math.max(...ex.sets.map(s=>s.w));const prev=sessions.filter(s=>s.date<session.date||(s.date===session.date&&s.id!==session.id)).flatMap(s=>s.exercises.filter(e=>e.name===exName)).flatMap(e=>e.sets.map(s=>s.w));if(!prev.length)return false;return mw>Math.max(...prev);}
function countPRs(){let n=0;sessions.forEach(s=>s.exercises.forEach(ex=>{if(isNewPR(s,ex.name))n++;}));return n;}
function progressFor(name){return sessions.filter(s=>s.exercises.some(e=>e.name===name)).map(s=>{const ex=s.exercises.find(e=>e.name===name);return{date:fmtDate(s.date),mw:Math.max(...ex.sets.map(s=>s.w)),vol:Math.round(ex.sets.reduce((t,set)=>t+set.r*Math.max(set.w,0),0))};});}
function groupByMonth(ss){const g={};ss.forEach(s=>{const k=fmtMonth(s.date);if(!g[k])g[k]=[];g[k].push(s);});return g;}

function getMuscleStats(){
  const stats={};
  sessions.forEach(s=>s.exercises.forEach(ex=>{
    const map=MUSCLE_MAP[ex.name];if(!map)return;
    const vol=ex.sets.reduce((t,set)=>t+set.r*Math.max(set.w,0),0);
    const maxW=Math.max(...ex.sets.map(set=>set.w));
    Object.entries(map).forEach(([muscle,score])=>{
      if(!stats[muscle])stats[muscle]={totalVol:0,exercises:{}};
      stats[muscle].totalVol+=vol*(score/5);
      if(!stats[muscle].exercises[ex.name])stats[muscle].exercises[ex.name]={vol:0,sessions:0,maxW:0,score};
      stats[muscle].exercises[ex.name].vol+=vol;
      stats[muscle].exercises[ex.name].sessions++;
      stats[muscle].exercises[ex.name].maxW=Math.max(stats[muscle].exercises[ex.name].maxW,maxW);
    });
  }));
  return stats;
}

async function initDb(){db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);const{error}=await db.from('sessions').select('id').limit(1);if(error)throw error;}
async function loadSessions(){const{data,error}=await db.from('sessions').select('*').order('date',{ascending:true});if(error)throw error;sessions=(data||[]).map(r=>({...r,exercises:r.exercises||[]}));if(!sessions.length)await seedData();}
async function seedData(){const{data,error}=await db.from('sessions').insert(SEED).select();if(error)throw error;sessions=data.map(r=>({...r,exercises:r.exercises||[]}));}
async function addSession(s){const{data,error}=await db.from('sessions').insert([s]).select();if(error)throw error;sessions=[...sessions,...data].sort((a,b)=>a.date.localeCompare(b.date));}
async function updateSession(id,s){const{error}=await db.from('sessions').update(s).eq('id',id);if(error)throw error;sessions=sessions.map(x=>x.id===id?{...x,...s}:x);}
async function deleteSession(id){const{error}=await db.from('sessions').delete().eq('id',id);if(error)throw error;sessions=sessions.filter(s=>s.id!==id);}

    <div class="month-header">
      <div class="month-label">${month.toUpperCase()}</div>

      <div class="month-count">${ss.length}</div>
    </div>

      const fc=FCHEX[s.focus]||'#888';

      const prExNames=s.exercises.filter(ex=>isNewPR(s,ex.name)).map(e=>e.name);

            <div class="s-main">

              <div class="s-title-row">
                <div class="s-title" style="color:${fc}">${s.focus}</div>
                <span class="focus-tag" style="background:${fc}18;color:${fc}">${s.exercises.length} ex</span>
                ${hasPR?'<span class="pr-tag">★ PR</span>':''}
              </div>
              <div class="s-mini-bars">
                ${s.exercises.map(ex=>{const ev=ex.sets.reduce((t,set)=>t+set.r*Math.max(set.w,0),0);const h=Math.max(2,Math.round((ev/(maxExVol[ex.name]||1))*16));return`<div style="flex:1;height:${h}px;background:${fc};opacity:0.4;border-radius:1px 1px 0 0"></div>`;}).join('')}
              </div>
            </div>

              <div><span class="s-vol-num">${vol}</span><span class="s-vol-unit">kg</span></div>
              <span class="s-chevron ${open?'open':''}">▼</span>
            </div>
          </div>

            <div class="s-body">
              ${isEditing?renderEditForm(s):`
                <div class="s-body-inner">
                  ${s.exercises.map(ex=>{
                    const isPR=prExNames.includes(ex.name);
                    const mw=Math.max(...ex.sets.map(s=>s.w));
                    return`
                      <div class="ex-row">
                        <div class="ex-name-row">
                          ${ex.ss?'<span class="ss-pill">SS</span>':''}
                          <span class="ex-name-lbl ${isPR?'pr':''}">${ex.name}${isPR?` <span class="ex-pr-lbl">★${mw}kg</span>`:''}</span>
                        </div>
                        <div class="sets-row">

function renderMusclesTab(){

  const muscles=Object.keys(stats).sort((a,b)=>stats[b].totalVol-stats[a].totalVol);
  const maxVol=Math.max(...muscles.map(m=>stats[m].totalVol));
  return`
    <div class="section-header">
      <div class="section-title">MUSCLES</div>
      <div style="font-size:10px;color:var(--muted)">Tap a muscle to see exercises</div>

      ${muscles.map(muscle=>{
        const s=stats[muscle];const c=MUSCLE_COLORS[muscle]||'#888';

        <div class="section-title" style="color:${c};margin-bottom:0">${muscle.toUpperCase()}</div>

      </div>

      ${exercises.map(([name,data])=>{

}

  const lastByEx={};
  if(last)last.exercises.forEach(ex=>{lastByEx[ex.name]=ex.sets;});
  const existingNames=sessions.flatMap(s=>s.exercises.map(e=>e.name)).filter((n,i,a)=>a.indexOf(n)===i);
  const currentNames=f.exercises.map(e=>e.name).filter(Boolean);

  return`

    <div class="add-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Date</label>

            ${['Push','Pull','Legs','Upper','Other'].map(foc=>`<option ${f.focus===foc?'selected':''}>${foc}</option>`).join('')}

      ${last?`
        <div class="tmpl-banner">

      <div id="ex-list">
        ${f.exercises.map((ex,ei)=>{
          const lastSets=lastByEx[ex.name]||null;
          const sugg=ex.name?getProgSugg(ex.name,lastSets):null;
          const curMax=ex.sets.filter(s=>s.w).reduce((m,s)=>Math.max(m,+s.w),0);
          const prevMax=lastSets?Math.max(...lastSets.map(s=>s.w)):null;
          const alts=ex.name?getAlts(ex.name,currentNames):[];
          const fuzzy=ex.name?fuzzyMatch(ex.name,existingNames,0.5):[];
          const isAcOpen=acActive===ei&&fuzzy.length>0;
          return`
            <div class="ex-card">
              <div class="ex-card-header">
                <div class="reorder-wrap">
                  <button class="reorder-btn-add" ${ei===0?'disabled':''} onclick="moveEx(${ei},-1)">▲</button>
                  <button class="reorder-btn-add" ${ei===f.exercises.length-1?'disabled':''} onclick="moveEx(${ei},1)">▼</button>
                </div>
                <div class="ex-name-wrap" style="flex:1;margin:0 6px">
                  <input class="ex-name-input" placeholder="Exercise name…" value="${ex.name}" oninput="onExIn(${ei},this.value)" onfocus="onExFocus(${ei})" onblur="onExBlur()" autocomplete="off">
                  ${isAcOpen?`<div class="autocomplete">${fuzzy.map(name=>`<div class="ac-item" onmousedown="pickAc(${ei},'${name.replace(/'/g,"\\'")}')"><span>${name}</span><span class="ac-match">similar</span></div>`).join('')}</div>`:''}
                </div>
                <button class="rm-ex-btn-add" onclick="removeEx(${ei})">×</button>
              </div>
              ${sugg?`<div class="overload-hint"><span class="oh-icon">${sugg.type==='increase'?'🔼':sugg.type==='progress'?'💪':'🔄'}</span><div class="oh-text">${sugg.text}<br><strong>${sugg.suggestion}</strong></div><button class="oh-apply" onclick="applySugg(${ei},${sugg.sets},${sugg.reps},${sugg.weight})">Apply</button></div>`:''}
              ${alts.length?`<div class="alt-row"><span class="alt-label">Alt</span><div class="alt-chips">${alts.map(a=>`<button class="alt-chip" onclick="addAlt('${a.replace(/'/g,"\\'")}',${ei})">${a}</button>`).join('')}</div></div>`:''}
              ${ex.sets.map((set,si)=>{
                const prevSet=lastSets&&lastSets[si];
                const wNum=parseFloat(set.w)||0;
                const wd=wNum&&prevSet?wNum-prevSet.w:null;
                return`
                  <div class="set-form-row">
                    <span class="set-num">${si+1}</span>
                    <input class="set-input" type="number" placeholder="Reps" value="${set.r}" oninput="addForm.exercises[${ei}].sets[${si}].r=this.value">
                    <span class="set-sep">×</span>
                    <input class="set-input" type="number" placeholder="kg" step="0.5" value="${set.w}" oninput="addForm.exercises[${ei}].sets[${si}].w=this.value">
                    ${prevSet?`<span class="prev-ref ${wd===null?'':wd>0?'prev-up':wd<0?'prev-dn':''}">${prevSet.r}×${prevSet.w}</span>`:''}
                    ${ex.sets.length>1?`<button class="rm-set-btn" onclick="removeSet(${ei},${si})">×</button>`:''}
                  </div>`;
              }).join('')}
              <button class="add-set-btn" onclick="addSet(${ei})">+ Set</button>
            </div>`;
        }).join('')}
      </div>
      <button class="ghost-btn" onclick="addEx()">+ Exercise</button>
      <button class="save-btn" id="save-btn" onclick="saveSession()">Save Session →</button>
      <div style="height:10px"></div>
    </div>`;
}

function renderSetup(){
  document.getElementById('app').innerHTML=`
    <div class="setup-screen">
      <div class="setup-logo">LIFT<em>TRACK</em></div>
      <div class="setup-sub">Connect your Supabase database to get started.<br>Your data stays in your own account.</div>
      <div class="setup-card">
        <div class="setup-step"><div class="step-num">1</div><div class="step-text">Go to <a href="https://supabase.com" target="_blank">supabase.com</a> → New project → SQL Editor and run:<br><br><code>create table sessions (id uuid default gen_random_uuid() primary key, date date not null, focus text not null, exercises jsonb not null default '[]'::jsonb, created_at timestamptz default now());</code><br><br><code>alter table sessions enable row level security; create policy "Allow all" on sessions for all using (true) with check (true);</code></div></div>
        <div class="setup-step"><div class="step-num">2</div><div class="step-text">Settings → API → copy <strong>Project URL</strong> and <strong>anon public key</strong></div></div>
        <hr class="setup-hr">
        <label class="setup-lbl">Project URL</label><input class="form-input" id="su-url" placeholder="https://xxxx.supabase.co" style="margin-bottom:10px">
        <label class="setup-lbl">Anon Key</label><input class="form-input" id="su-key" placeholder="eyJhbGci…">
        <button class="setup-connect" onclick="connect()">Connect →</button>
        <div id="setup-err" style="color:var(--red);font-size:11px;margin-top:10px;text-align:center"></div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════
function switchTab(t){tab=t;acActive=null;if(t==='add'){addForm=defaultForm();loadTemplate(addForm.focus);return;}if(t!=='muscles')selMuscle=null;render();}
function selectEx(name){selEx=name;render();}
function toggleSession(id){if(editId===id){cancelEdit();return;}expandedId=expandedId===id?null:id;render();}
function changeFocus(focus){addForm.focus=focus;loadTemplate(focus);}
function loadTemplate(focus){const last=lastByFocus(focus);if(!last){addForm.exercises=[{name:'',sets:[{r:'',w:''}]}];addForm.templateFrom=null;}else{addForm.exercises=last.exercises.map(ex=>({name:ex.name,ss:ex.ss||false,sets:ex.sets.map(s=>({r:String(s.r),w:String(s.w)}))}));addForm.templateFrom={date:last.date,id:last.id};}acActive=null;render();}
function clearTemplate(){addForm.exercises=[{name:'',sets:[{r:'',w:''}]}];addForm.templateFrom=null;render();}
function useAsTemplate(id){const s=sessions.find(x=>x.id===id);if(!s)return;addForm={date:new Date().toISOString().split('T')[0],focus:s.focus,exercises:s.exercises.map(ex=>({name:ex.name,ss:ex.ss||false,sets:ex.sets.map(set=>({r:String(set.r),w:String(set.w)}))})),templateFrom:{date:s.date,id:s.id}};tab='add';acActive=null;render();setTimeout(()=>{const c=document.getElementById('content');if(c)c.scrollTop=0;},50);}

// Edit session
function startEdit(id){const s=sessions.find(x=>x.id===id);if(!s)return;editId=id;editForm={date:s.date,focus:s.focus,exercises:s.exercises.map(ex=>({name:ex.name,ss:ex.ss||false,sets:ex.sets.map(set=>({r:String(set.r),w:String(set.w)}))}))};render();}
function cancelEdit(){editId=null;editForm=null;render();}
function eAddEx(){editForm.exercises.push({name:'',sets:[{r:'',w:''}]});render();}
function eRemoveEx(i){editForm.exercises.splice(i,1);render();}
function eAddSet(ei){editForm.exercises[ei].sets.push({r:'',w:''});render();}
function eRemoveSet(ei,si){editForm.exercises[ei].sets.splice(si,1);render();}
function eMoveEx(ei,dir){const exs=editForm.exercises;const t=ei+dir;if(t<0||t>=exs.length)return;[exs[ei],exs[t]]=[exs[t],exs[ei]];render();}
async function saveEdit(){const exs=editForm.exercises.filter(e=>e.name.trim()).map(e=>({name:e.name.trim(),ss:e.ss||false,sets:e.sets.filter(s=>s.r&&s.w).map(s=>({r:+s.r,w:+s.w}))})).filter(e=>e.sets.length);if(!exs.length){toast('Add at least one exercise',true);return;}loading=true;render();try{await updateSession(editId,{date:editForm.date,focus:editForm.focus,exercises:exs});toast('Session updated ✓');editId=null;editForm=null;}catch(e){toast('Error: '+e.message,true);}loading=false;render();}

// Add form
function onExIn(ei,val){addForm.exercises[ei].name=val;acActive=val.length>=2?ei:null;render();}
function onExFocus(ei){if(addForm.exercises[ei].name.length>=2)acActive=ei;}
function onExBlur(){setTimeout(()=>{acActive=null;render();},150);}
function pickAc(ei,name){addForm.exercises[ei].name=name;acActive=null;render();}
function moveEx(ei,dir){const exs=addForm.exercises;const t=ei+dir;if(t<0||t>=exs.length)return;[exs[ei],exs[t]]=[exs[t],exs[ei]];render();}
function addEx(){addForm.exercises.push({name:'',sets:[{r:'',w:''}]});acActive=null;render();}
function removeEx(i){addForm.exercises.splice(i,1);acActive=null;render();}
function addSet(ei){addForm.exercises[ei].sets.push({r:'',w:''});render();}
function removeSet(ei,si){addForm.exercises[ei].sets.splice(si,1);render();}
function applySugg(ei,sets,reps,weight){addForm.exercises[ei].sets=Array.from({length:sets},()=>({r:String(reps),w:String(weight)}));render();}
function addAlt(name,afterIdx){const ls=[...sessions].reverse().find(s=>s.exercises.some(e=>e.name===name));const sets=ls?ls.exercises.find(e=>e.name===name).sets.map(s=>({r:String(s.r),w:String(s.w)})):[{r:'',w:''}];addForm.exercises.splice(afterIdx+1,0,{name,sets});render();}

async function saveSession(){const btn=document.getElementById('save-btn');if(btn)btn.disabled=true;const exs=addForm.exercises.filter(e=>e.name.trim()).map(e=>({name:e.name.trim(),sets:e.sets.filter(s=>s.r&&s.w).map(s=>({r:+s.r,w:+s.w}))})).filter(e=>e.sets.length);if(!exs.length){toast('Add at least one exercise',true);if(btn)btn.disabled=false;return;}loading=true;render();try{await addSession({date:addForm.date,focus:addForm.focus,exercises:exs});toast('Session saved ✓');tab='sessions';addForm=defaultForm();}catch(e){toast('Error: '+e.message,true);}loading=false;render();}
async function confirmDelete(id){if(!confirm('Delete this session?'))return;loading=true;render();try{await deleteSession(id);toast('Deleted');}catch(e){toast('Error: '+e.message,true);}loading=false;render();}
async function connect(){const url=document.getElementById('su-url').value.trim();const key=document.getElementById('su-key').value.trim();const errEl=document.getElementById('setup-err');if(!url||!key){errEl.textContent='Both fields required.';return;}errEl.textContent='Connecting…';SUPABASE_URL=url;SUPABASE_KEY=key;try{await initDb();localStorage.setItem('lt_url',url);localStorage.setItem('lt_key',key);loading=true;render();await loadSessions();toast('Connected ✓');}catch(e){errEl.textContent='Failed: '+e.message;SUPABASE_URL='';SUPABASE_KEY='';return;}loading=false;render();}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
async function init(){
  if(SUPABASE_URL&&SUPABASE_KEY){loading=true;render();try{await initDb();await loadSessions();}catch(e){localStorage.removeItem('lt_url');localStorage.removeItem('lt_key');SUPABASE_URL='';SUPABASE_KEY='';toast('DB connection failed',true);}loading=false;}
  render();
  if('serviceWorker' in navigator)navigator.serviceWorker.register('/lifttrack/sw.js', { scope: '/lifttrack/' }).catch(()=>{});
}
init();
</script>
</body>
